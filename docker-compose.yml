services:
  postgres:
    image: postgres:17-alpine
    container_name: hotel-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_erp
      POSTGRES_USER: hotel_erp
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - hotel_erp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_erp -d hotel_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hotel-erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hotel_erp_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hotel_erp_postgres:
  hotel_erp_redis:
