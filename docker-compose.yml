services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: frontier2-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "${APP_HOST_PORT:-18000}:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: frontier2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_erp
      POSTGRES_USER: hotel_erp
      POSTGRES_PASSWORD: secret
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - hotel_erp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_erp -d hotel_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: frontier2-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - hotel_erp_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hotel_erp_postgres:
  hotel_erp_redis:
